services:
  postgres:
    image: postgres:16
    container_name: book-promo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - book_promo_postgres_data:/var/lib/postgresql/data

volumes:
  book_promo_postgres_data: